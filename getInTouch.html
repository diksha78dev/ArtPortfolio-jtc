<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get In Touch | Jiya The Coolartist</title>
    <link rel="stylesheet" href="getInTouch.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <!-- NAVBAR TITLE -->
    <header class="header">
        <h1>Get In Touch 🎨</h1>
        <p>Let's create something beautiful together</p>
    </header>

    <section class="contact-container">

        <!-- LEFT SIDE INFO -->
        <div class="contact-info">
            <h2>Contact Information</h2>
            <p>
                Have questions about art classes, collaborations,
                or commissions? Feel free to reach out!
            </p>

            <div class="info-item">
                <i class="fas fa-envelope"></i>
                <span><a href="mailto:jiyabatra0007@gmail.com" style="text-decoration: none;">jiyabatra0007@gmail.com</a></span>
            </div>

            <div class="info-item">
                <i class="fas fa-map-marker-alt"></i>
                <span>India</span>
            </div>

            <h3>Follow Me On</h3>

            <div class="social-links">
                <!-- Replace links with your real ones -->
                <a href="https://www.youtube.com/@jiya_the_coolartist/videos" target="_blank">
                    <i class="fab fa-youtube"></i>
                </a>

                <a href="https://www.instagram.com/jiya_the_coolartist/" target="_blank">
                    <i class="fab fa-instagram"></i>
                </a>

                <a href="https://www.linkedin.com/in/jiya-batra-12b02b289" target="_blank">
                    <i class="fab fa-linkedin"></i>
                </a>

                 <a href="https://github.com/JiyaBatra" target="_blank">
                    <i class="fab fa-github"></i>
                </a>

                 <a href="https://discord.gg/PzvvW59g" target="_blank">
                    <i class="fab fa-discord"></i>
                </a>
            </div>
        </div>

        <!-- CONTACT FORM -->
        <div class="contact-form">
            <form>
                <h2>Send a Message</h2>

                <input type="text" placeholder="Your Name" required>

                <input type="email" placeholder="Your Email" required>

                <input type="text" placeholder="Subject">

                <textarea rows="5" placeholder="Your Message"></textarea>

                <button type="submit">Send Message ✨</button>
            </form>
        </div>

    </section>

    <footer>
        <p>© 2026 Jiya The Coolartist | All Rights Reserved</p>
    </footer>

</body>
</html>
